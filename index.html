<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@closuu</title>
    <style>
        /* font */
        @font-face {
            font-family: 'CustomFont';
            src: url('assets/d_bitmap9px.ttf') format('truetype');
        }

        :root {
            --bg: #080808;
            --card-bg: #0e0e0e;
            --border: #2e2e2e;
            --accent1: #aaaaaa;
            --accent2: #444444;
            --text: #ffffff;
            --link: #c8c8c8;
            --link-hover: #ffffff;
            --scanline: rgba(0,0,0,0.18);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'CustomFont', monospace;
            overflow-x: hidden;
            image-rendering: pixelated;
            text-transform: lowercase;
        }

        /* subtle scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 5px,
                var(--scanline) 5px,
                var(--scanline) 6px
            );
            pointer-events: none;
            z-index: 9000;
        }

        /* loader overlay */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* loader d-pad (same as card d-pad, 1:1) */
        .dpad-loader {
            animation: spin 1.2s steps(8, end) infinite;
            filter: grayscale(1) brightness(1.5);
        }

        /* card hidden while loading */
        body.loading .cardd { opacity: 0; pointer-events: none; }

        /* main card */
        .cardd {
            position: relative;
            border: 2px solid var(--border);
            padding: 2rem;
            max-width: 480px;
            margin: 5% auto;
            background-color: var(--card-bg);
            box-shadow: 0 0 0 1px #1e1e1e, 0 0 20px rgba(100,100,100,0.1);
            animation: fadeIn 1.2s ease-out;
            overflow: visible;
        }


        /* rotating d-pad in card upper-right */
        .dpad-orbit {
            position: absolute;
            top: -24px;
            right: -24px;
            opacity: 0.2;
            animation: spin 4s steps(8, end) infinite;
            filter: grayscale(1);
            z-index: 5;
            pointer-events: none;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* profile pic */
        .profile-pic-container {
            position: relative;
            display: inline-block;
        }

        .profile-pic {
            width: 96px; height: 96px;
            object-fit: cover;
            image-rendering: pixelated;
            border: 2px solid var(--accent1);
            margin-bottom: 0.75rem;
            cursor: pointer;
            display: block;
        }

        /* rpg-style dialogue popup */
        .dialogue-box {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: #0e0e0e;
            color: #fff;
            border: 2px solid #fff;
            font-family: 'CustomFont', monospace;
            font-size: 0.78rem;
            padding: 6px 10px 8px;
            white-space: nowrap;
            z-index: 20;
            display: none;
            image-rendering: pixelated;
        }
        /* pixel tail under dialogue */
        .dialogue-box::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px; height: 6px;
            background: #fff;
            clip-path: polygon(0 0,100% 0,50% 100%);
        }
        .dialogue-box::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px; height: 5px;
            background: #0e0e0e;
            z-index: 1;
            clip-path: polygon(0 0,100% 0,50% 100%);
        }
        /* blinking block cursor */
        .dialogue-cursor {
            display: inline-block;
            width: 5px; height: 9px;
            background: #fff;
            margin-left: 3px;
            vertical-align: middle;
            animation: blink 0.65s steps(1) infinite;
        }
        @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

        h1 {
            font-size: 1.6rem;
            margin-top: 0.4rem;
            color: var(--text);
            letter-spacing: 0.05em;
        }

        .desc {
            font-size: 0.85rem;
            margin-top: 0.75rem;
            line-height: 1.8;
            opacity: 0;
            animation: fadeText 2s ease forwards;
            animation-delay: 0.8s;
            color: #ccc;
        }

        /* regular links */
        .links a {
            display: block;
            margin-top: 0.6rem;
            color: var(--link);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .links a:hover { color: var(--link-hover); text-decoration: underline; }

        /* shortcuts toggle button */
        .shortcuts-toggle {
            display: inline-block;
            margin-top: 1rem;
            background: none;
            border: 1px solid var(--accent2);
            color: var(--accent1);
            font-family: 'CustomFont', monospace;
            font-size: 0.75rem;
            padding: 3px 10px;
            cursor: pointer;
            text-transform: lowercase;
            transition: border-color 0.2s, color 0.2s;
            image-rendering: pixelated;
        }
        .shortcuts-toggle:hover { border-color: var(--accent1); color: var(--link-hover); }

        /* shortcuts panel */
        .shortcuts {
            display: none;
            margin-top: 0.5rem;
        }
        .shortcuts.open { display: block; }

        .shortcuts a {
            display: block;
            margin-top: 0.5rem;
            color: var(--link);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .shortcuts a:hover { color: var(--link-hover); text-decoration: underline; }

        /* divider */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1rem 0 0.5rem;
        }

        @keyframes fadeIn {
            from { opacity:0; transform: translateY(16px); }
            to   { opacity:1; transform: translateY(0); }
        }
        @keyframes fadeText { to { opacity:1; } }

        @media (max-width: 520px) {
            .cardd { margin: 1.5rem 1rem; padding: 1.25rem; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>

<body class="loading">

    <!-- loader screen -->
    <div id="loader">

        <svg class="dpad-loader" width="64" height="64" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;">

                <rect x="18" y="36" width="20" height="18" fill="#999"/>
                <line x1="28" y1="38" x2="28" y2="52" stroke="#555" stroke-width="5"/>
                <rect x="2" y="18" width="18" height="20" fill="#999"/>
                <line x1="4" y1="28" x2="18" y2="28" stroke="#555" stroke-width="5"/>
                <rect x="36" y="18" width="18" height="20" fill="#999"/>
                <line x1="38" y1="28" x2="52" y2="28" stroke="#555" stroke-width="5"/>

    <!-- main card -->
    <div class="cardd text-center" style="text-align:center;">
        <!-- orbiting d-pad upper-right -->
        <!-- orbiting d-pad: same blocky arrows -->
        <svg class="dpad-orbit" width="72" height="72" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;">
            <defs>
                <filter id="shadow-orbit" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#000" flood-opacity="0.9"/>
                </filter>
            </defs>
            <g filter="url(#shadow-orbit)">
                <rect x="18" y="2" width="20" height="18" fill="#ccc"/>
                <line x1="28" y1="4" x2="28" y2="18" stroke="#666" stroke-width="5"/>
                <rect x="18" y="36" width="20" height="18" fill="#ccc"/>
                <line x1="28" y1="38" x2="28" y2="52" stroke="#666" stroke-width="5"/>
                <rect x="2" y="18" width="18" height="20" fill="#ccc"/>
                <line x1="4" y1="28" x2="18" y2="28" stroke="#666" stroke-width="5"/>
                <rect x="36" y="18" width="18" height="20" fill="#ccc"/>
                <line x1="38" y1="28" x2="52" y2="28" stroke="#666" stroke-width="5"/>

        <!-- profile pic -->
        <div class="profile-pic-container">

    </div>

    <script>
        // html5 click sound using web audio api
        function makeClickSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.type = 'square';
            o.frequency.setValueAtTime(440, ctx.currentTime);
            o.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.08);
            g.gain.setValueAtTime(0.18, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
            o.start(); o.stop(ctx.currentTime + 0.12);
        }

        // nav click sound (slightly higher pitch)
        function makeNavSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.type = 'square';
            o.frequency.setValueAtTime(660, ctx.currentTime);
            o.frequency.exponentialRampToValueAtTime(330, ctx.currentTime + 0.07);
            g.gain.setValueAtTime(0.15, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            o.start(); o.stop(ctx.currentTime + 0.1);
        }

        window.addEventListener("DOMContentLoaded", () => {
            // loader dismiss after 2s
            setTimeout(() => {
                document.body.classList.remove("loading");
                document.getElementById("loader").style.display = "none";
            }, 2000);

            // pfp click — original mp3 sound
            const pfp = document.getElementById("pfp");
            const dialogue = document.getElementById("dialogue-box");
            const clickSound = new Audio("assets/nepgya.mp3");

            pfp.addEventListener("click", () => {
                clickSound.currentTime = 0;
                clickSound.play();
                dialogue.style.display = "block";
                setTimeout(() => { dialogue.style.display = "none"; }, 3000);
            });

            // shortcuts toggle
            const btn = document.getElementById("shortcuts-btn");
            const panel = document.getElementById("shortcuts-panel");
            btn.addEventListener("click", () => {
                makeClickSound();
                panel.classList.toggle("open");
                btn.textContent = panel.classList.contains("open") ? "[ shortcuts ▲ ]" : "[ shortcuts ]";
            });

            // nav link sounds
            document.querySelectorAll(".shortcuts a").forEach(a => {
                a.addEventListener("click", () => makeNavSound());
            });
        });
    </script>
</body>
</html>
